<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        /* 基础样式 */
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            height: 100vh;
        }
        /* 棋牌桌部分 */
        #game-table {
            flex: 3;
            background-color: #f0f0f0;
            padding: 20px;
            box-sizing: border-box;
        }
        /* 聊天部分 */
        #chat {
            flex: 1;
            background-color: #e0e0e0;
            padding: 20px;
            box-sizing: border-box;
        }
    </style>
    <script>

    </script>
</head>
<body>
    <!--棋牌桌部分-->
    <div id="game-table">
        <iframe id="game-table-frame" src="/game" title="Game Table" style="width: 100%; height: 100%; border: none;"></iframe>
    </div>
    <!--聊天部分-->
    <div id="chat">
        <iframe id="chat-frame" src="/chat" title="Chat Table" style="width: 100%; height: 100%; border: none;"></iframe>
    </div>

    <script>
        let ws = null
        const frameTable = document.getElementById('game-table-frame');
        const frameChat = document.getElementById('chat-frame');
        // 加载页面时初始化WebSocket连接
        window.onload = function() {
            initWS();
        };
        function initWS(){
            ws = new WebSocket('/api/ws');

            ws.onopen = function() {
                console.log('WebSocket连接已打开');
            };
            ws.onmessage = function(event) {
                console.log('收到消息:',event.data);
                const data = JSON.parse(event.data);
                
                if (/^Game/.test(data.event)) {
                    console.log('转发Game事件给game.html');
                    if(frameTable && frameTable.contentWindow) {
                        frameTable.contentWindow.postMessage(data, '*');
                    }
                } else if (/^Chat/.test(data.event)) {
                    console.log('转发Chat事件给chat.html');
                    if(frameChat && frameChat.contentWindow) {
                        frameChat.contentWindow.postMessage(data, '*');
                    }
                } else {
                    console.warn('未知事件类型:', data.event);
                }
            };
            ws.onclose = function() {
                console.log('WebSocket连接已关闭');
            };
            ws.onerror = function(error) {
                console.error('WebSocket发生错误:', error);
            };
        }

        // 监听来自子窗口的消息
        window.addEventListener('message', function(event) {
            console.log('收到来自子窗口的消息:', event.data);
            const data = event.data;
            console.log('转发给服务器');
            if (!ws || ws.readyState !== WebSocket.OPEN) {
                console.warn('WebSocket连接未打开,无法发送消息');
                return;
            }
            ws.send(JSON.stringify({ event: data.event, data: data.data }));
        });

    </script>      

</body>
</html>
