<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        /* 基础样式 */
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            height: 100vh;
        }
        /* 棋牌桌部分 */
        #game-table {
            flex: 3;
            background-color: #f0f0f0;
            padding: 20px;
            box-sizing: border-box;
        }
        /* 聊天部分 */
        #chat {
            flex: 1;
            background-color: #e0e0e0;
            padding: 20px;
            box-sizing: border-box;
        }
    </style>
    <script>

    </script>
</head>
<body>
    <!--棋牌桌部分-->
    <div id="game-table">
        <iframe id="game-table-frame" src="/game" title="Game Table" style="width: 100%; height: 100%; border: none;"></iframe>
    </div>
    <!--聊天部分-->
    <div id="chat">
        <h2>聊天</h2>
        <!-- 聊天框 -->
        <div id="broadcast">
        <!-- 输入框 -->
        <input type="text" id="chat-input" placeholder="输入消息">
        <button id="send-btn">发送</button>

        <!-- 开始游戏 -->
        <button id="start-game-btn">开始游戏</button>
        <!-- 创建房间 -->
        <button id="create-room-btn">创建房间</button>
        <!-- 加入房间 -->
        <input type="text" id="join-room-input" placeholder="输入房间ID">
        <button id="join-room-btn">加入房间</button>
        <!-- 房间玩家列表 -->
        <h3>房间玩家列表</h3>
        <div id="room-player-list">

    </div>

    <script>
        let ws = null
        // 加载页面时初始化WebSocket连接
        window.onload = function() {
            initWS();
        };
        function initWS(){
            ws = new WebSocket('/api/ws');

            ws.onopen = function() {
                console.log('WebSocket连接已打开');
            };
            ws.onmessage = function(event) {
                console.log('收到消息:', event.data);
                const data = JSON.parse(event.data);
                // 分情况处理不同事件类型的消息
                if(data.event === 'Broadcast'){
                    const broadcastDiv = document.getElementById('broadcast');
                    const message = document.createElement('p');
                    message.textContent = data.data.from + ': ' + data.data.message;
                    broadcastDiv.appendChild(message);
                } else if(data.event === 'RoomPlayerList') {
                    const playerListDiv = document.getElementById('room-player-list');
                    playerListDiv.innerHTML = ''; // 清空当前列表
                    data.data.forEach(player => {
                        const playerItem = document.createElement('p');
                        playerItem.textContent = player.name + ' - ' + player.status;
                        playerListDiv.appendChild(playerItem);
                    });
                }  else if(data.event === 'StartGame'){//转发给game.html处理
                    console.log('转发StartGame事件给game.html');
                    const frameTable = document.getElementById('game-table-frame');
                    if(frameTable && frameTable.contentWindow) {
                        frameTable.contentWindow.postMessage(data.data, '*');
                    }
                }
            };
            ws.onclose = function() {
                console.log('WebSocket连接已关闭');
            };
            ws.onerror = function(error) {
                console.error('WebSocket发生错误:', error);
            };
        }

        // 发送消息
        document.getElementById('send-btn').addEventListener('click', function() {
            const input = document.getElementById('chat-input');
            const message = input.value.trim();
            if(message && ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({ event: 'Broadcast', data: message }));
                input.value = '';
            }
        });

        // 创建房间
        document.getElementById('create-room-btn').addEventListener('click', function() {
            if(ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({ event: 'CreateRoom' }));
            }
        });

        // 加入房间
        document.getElementById('join-room-btn').addEventListener('click', function() {
            const input = document.getElementById('join-room-input');
            const roomID = input.value.trim();
            if(roomID && ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({ event: 'JoinRoom', data: { room_id: roomID } }));
                input.value = '';
            }
        });

        // 开始游戏
        document.getElementById('start-game-btn').addEventListener('click',function(){
            if(ws && ws.readyState === WebSocket.OPEN){
                ws.send(JSON.stringify({event:'StartGame'}))
            }
        });
    </script>      

</body>
</html>
